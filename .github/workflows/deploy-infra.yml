name: Deploy Infrastructure – Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-infra.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}

# Prevent concurrent runs to avoid state conflicts
concurrency:
  group: terraform-infra
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Lint & validate – runs on every push and pull_request
  # ---------------------------------------------------------------------------
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ./infrastructure
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: ./infrastructure
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./infrastructure
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Plan – runs on pull_requests only (no deploy)
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan (PR only)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LABROLE_ARN: ${{ secrets.LABROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ./infrastructure
        run: terraform plan -no-color -var="lambda_exec_role_arn=${LABROLE_ARN}" 2>&1 | tee /tmp/plan.txt

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const maxLen = 65000;
            const output = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${output}\n\`\`\``
            });

  # ---------------------------------------------------------------------------
  # Deploy – infrastructure only (main branch only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LABROLE_ARN: ${{ secrets.LABROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init

      - name: Terraform Apply
        working-directory: ./infrastructure
        run: terraform apply -auto-approve -var="lambda_exec_role_arn=${LABROLE_ARN}"

      - name: Show Infrastructure Outputs
        working-directory: ./infrastructure
        run: terraform output -json
